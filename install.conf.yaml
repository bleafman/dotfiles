- defaults:
    link:
      relink: true

- clean: ["~"]

- link:
    ~/.zprofile: zprofile
    ~/.gitconfig: .gitconfig
    ~/.gitignore_global:
    ~/.shell:
    ~/.zshrc:
    ~/.claude/commands: claude/commands
    ~/.claude/hooks:
      path: claude/hooks
      force: true
    ~/Library/Application Support/Code/User/settings.json:
      path: vscode/settings.json
      force: true
      create: true
